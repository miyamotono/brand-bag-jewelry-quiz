<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メゾン・アカデミー｜ブランドバッグ＆ジュエリー検定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --dial:#0E141F; --dial-2:#151E2C; --card:#1A2334; --card-2:#212C40;
    --line:#2C3852; --gold:#C9A96B; --gold-soft:#A98F5E; --gold-bright:#E4C98C;
    --silver:#EAE7DF; --muted:#8A94A6; --correct:#7FB08A; --wrong:#C77E7E;
    --shadow:0 20px 60px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Zen Kaku Gothic New",sans-serif;
    color:var(--silver);
    background:
      radial-gradient(1200px 700px at 50% -12%, #24304A 0%, var(--dial) 58%),
      var(--dial);
    min-height:100vh;
    display:flex;justify-content:center;
    padding:28px 16px 64px;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .app{width:100%;max-width:680px}

  /* ---- header ---- */
  .brand{text-align:center;margin-bottom:26px}
  .brand .eyebrow{
    font-size:.72rem;letter-spacing:.42em;text-indent:.42em;
    color:var(--gold-soft);font-weight:500;margin-bottom:10px;
  }
  .brand h1{
    font-family:"Shippori Mincho",serif;font-weight:700;
    font-size:1.9rem;letter-spacing:.06em;color:var(--silver);
  }
  .brand .sub{color:var(--muted);font-size:.86rem;margin-top:8px}
  .rule{
    height:1px;margin:22px auto 0;max-width:210px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:.7;
  }

  /* ---- screens ---- */
  .screen{display:none;animation:fade .5s ease both}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .lead{text-align:center;color:var(--muted);font-size:.92rem;margin-bottom:22px}

  /* ---- category grid ---- */
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:520px){.cat-grid{grid-template-columns:1fr}}
  .cat{
    background:linear-gradient(180deg,var(--card-2),var(--card));
    border:1px solid var(--line);border-radius:16px;
    padding:20px 18px;text-align:left;cursor:pointer;color:inherit;
    transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
    position:relative;overflow:hidden;
  }
  .cat:hover{transform:translateY(-3px);border-color:var(--gold-soft);box-shadow:var(--shadow)}
  .cat:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .cat .cat-name{font-family:"Shippori Mincho",serif;font-weight:600;font-size:1.12rem;color:var(--gold-bright);margin-bottom:6px}
  .cat .cat-desc{font-size:.8rem;color:var(--muted);min-height:2.4em}
  .cat .cat-count{font-size:.72rem;color:var(--gold-soft);margin-top:12px;letter-spacing:.08em}
  .cat.mix{grid-column:1/-1;text-align:center;background:linear-gradient(180deg,#2A2016,#1C1A18);border-color:var(--gold-soft)}
  .cat.mix .cat-name{color:var(--gold-bright)}
  .cat.mix .cat-desc{min-height:0}

  /* ---- difficulty ---- */
  .diff-grid{display:grid;gap:12px}
  .diff{
    display:flex;align-items:center;gap:16px;
    background:linear-gradient(180deg,var(--card-2),var(--card));
    border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;cursor:pointer;color:inherit;text-align:left;
    transition:transform .16s ease,border-color .16s ease;
  }
  .diff:hover{transform:translateY(-2px);border-color:var(--gold-soft)}
  .diff:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .crown{
    font-family:"Shippori Mincho",serif;font-size:1.1rem;color:var(--gold);
    width:44px;height:44px;flex:0 0 44px;border:1px solid var(--gold-soft);border-radius:50%;
    display:flex;align-items:center;justify-content:center;letter-spacing:0;
  }
  .diff .d-name{font-weight:700;font-size:1rem}
  .diff .d-desc{font-size:.78rem;color:var(--muted)}
  .diff .d-count{margin-left:auto;font-size:.74rem;color:var(--gold-soft)}

  .back{
    display:inline-flex;align-items:center;gap:6px;margin-top:22px;
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:.84rem;
    font-family:inherit;
  }
  .back:hover{color:var(--gold)}

  /* ---- quiz HUD ---- */
  .hud{display:flex;align-items:center;gap:14px;margin-bottom:16px;font-size:.8rem;color:var(--muted)}
  .hud .qnum{font-family:"Shippori Mincho",serif;color:var(--gold-bright);font-size:.95rem;letter-spacing:.05em}
  .reserve{flex:1;height:5px;background:var(--line);border-radius:99px;overflow:hidden}
  .reserve-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold-soft),var(--gold-bright));transition:width .4s ease}
  .streak{display:flex;align-items:center;gap:5px;color:var(--gold-soft)}

  /* ---- question card ---- */
  .qcard{
    background:linear-gradient(180deg,var(--card-2),var(--card));
    border:1px solid var(--line);border-radius:18px;
    padding:24px 22px;box-shadow:var(--shadow);
  }
  .qcat{font-size:.72rem;letter-spacing:.18em;color:var(--gold-soft);margin-bottom:12px}
  .qtext{font-family:"Shippori Mincho",serif;font-size:1.2rem;font-weight:600;line-height:1.6;margin-bottom:20px}
  .opts{display:grid;gap:10px}
  .opt{
    text-align:left;background:var(--dial-2);border:1px solid var(--line);
    border-radius:12px;padding:14px 16px;cursor:pointer;color:inherit;font-family:inherit;
    font-size:.96rem;transition:border-color .15s ease,background .15s ease,transform .1s ease;
    display:flex;align-items:center;gap:12px;
  }
  .opt:hover:not(:disabled){border-color:var(--gold-soft);transform:translateX(2px)}
  .opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .opt .mark{
    width:26px;height:26px;flex:0 0 26px;border-radius:50%;border:1px solid var(--gold-soft);
    display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--gold);
    font-family:"Shippori Mincho",serif;
  }
  .opt.correct{border-color:var(--correct);background:rgba(127,176,138,.14)}
  .opt.correct .mark{border-color:var(--correct);color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:rgba(199,126,126,.14)}
  .opt.wrong .mark{border-color:var(--wrong);color:var(--wrong)}
  .opt:disabled{cursor:default}

  .explain{
    margin-top:18px;border-top:1px dashed var(--line);padding-top:16px;
    display:none;animation:fade .35s ease both;
  }
  .explain.show{display:block}
  .explain .verdict{font-family:"Shippori Mincho",serif;font-weight:700;margin-bottom:8px;font-size:1rem}
  .explain .verdict.ok{color:var(--correct)}
  .explain .verdict.ng{color:var(--wrong)}
  .explain .note{font-size:.9rem;color:var(--silver);opacity:.92}

  .next-btn{
    margin-top:18px;width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;
    font-family:"Shippori Mincho",serif;font-weight:600;font-size:1rem;letter-spacing:.08em;
    color:#1A140A;background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    transition:filter .15s ease;
  }
  .next-btn:hover{filter:brightness(1.06)}
  .next-btn:focus-visible{outline:2px solid var(--silver);outline-offset:2px}

  /* ---- result ---- */
  .result{text-align:center}
  .gauge-wrap{position:relative;width:190px;height:190px;margin:8px auto 4px}
  .gauge-num{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .gauge-num .pct{font-family:"Shippori Mincho",serif;font-size:2.5rem;color:var(--gold-bright);line-height:1}
  .gauge-num .frac{font-size:.82rem;color:var(--muted);margin-top:4px}
  .title-badge{
    font-family:"Shippori Mincho",serif;font-size:1.5rem;font-weight:700;color:var(--silver);
    margin:14px 0 6px;letter-spacing:.05em;
  }
  .title-sub{color:var(--muted);font-size:.9rem;margin-bottom:26px}
  .res-actions{display:grid;gap:11px;max-width:320px;margin:0 auto}
  .res-actions button{
    padding:14px;border-radius:12px;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;
    border:1px solid var(--line);background:var(--card-2);color:var(--silver);transition:border-color .15s ease,transform .12s ease;
  }
  .res-actions button:hover{border-color:var(--gold-soft);transform:translateY(-2px)}
  .res-actions .primary{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1A140A;border:none}
  .foot{margin-top:34px;text-align:center;color:var(--muted);font-size:.72rem;letter-spacing:.06em;opacity:.7}

  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="eyebrow">MAISON ACADEMY</div>
    <h1>メゾン・アカデミー</h1>
    <div class="sub">ブランドバッグ＆ジュエリー検定 ― 全300問</div>
    <div class="rule"></div>
  </div>

  <!-- ===== START ===== -->
  <section id="startScreen" class="screen active">
    <p class="lead">挑戦するカテゴリーを選んでください。</p>
    <div id="catGrid" class="cat-grid"></div>
    <div class="foot">各カテゴリー 初級・中級・上級 各20問／回答ごとに豆知識つき</div>
  </section>

  <!-- ===== DIFFICULTY ===== -->
  <section id="diffScreen" class="screen">
    <p class="lead" id="diffLead">難易度を選んでください。</p>
    <div id="diffGrid" class="diff-grid"></div>
    <button class="back" id="backToCat">← カテゴリー選択に戻る</button>
  </section>

  <!-- ===== QUIZ ===== -->
  <section id="quizScreen" class="screen">
    <div class="hud">
      <span class="qnum" id="qNum">1 / 20</span>
      <div class="reserve"><div class="reserve-fill" id="reserveFill"></div></div>
      <span class="streak" id="streak">◆ 0</span>
    </div>
    <div class="qcard">
      <div class="qcat" id="qCat"></div>
      <div class="qtext" id="qText"></div>
      <div class="opts" id="opts"></div>
      <div class="explain" id="explain">
        <div class="verdict" id="verdict"></div>
        <div class="note" id="note"></div>
      </div>
      <button class="next-btn" id="nextBtn" style="display:none">次の問題 →</button>
    </div>
    <button class="back" id="quitBtn">← やめて最初に戻る</button>
  </section>

  <!-- ===== RESULT ===== -->
  <section id="resultScreen" class="screen">
    <div class="result">
      <div class="gauge-wrap">
        <svg width="190" height="190" viewBox="0 0 190 190">
          <circle cx="95" cy="95" r="88" fill="none" stroke="var(--line)" stroke-width="10"/>
          <circle id="gaugeArc" cx="95" cy="95" r="88" fill="none" stroke="var(--gold)" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="553"
            transform="rotate(-90 95 95)" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <div class="gauge-num">
          <span class="pct" id="pct">0%</span>
          <span class="frac" id="frac">0 / 20</span>
        </div>
      </div>
      <div class="title-badge" id="titleBadge">―</div>
      <div class="title-sub" id="titleSub"></div>
      <div class="res-actions">
        <button class="primary" id="retryBtn">もう一度挑戦する</button>
        <button id="otherLevelBtn">別の難易度を選ぶ</button>
        <button id="homeBtn">カテゴリー選択へ</button>
      </div>
    </div>
    <div class="foot">MAISON ACADEMY ― 知れば知るほど、一生の相棒選びは奥深い。</div>
  </section>
</div>

<script>
const QUESTIONS = [

/* ==================== メゾンの基礎 (maison) ==================== */
/* --- 初級 --- */
{c:"maison",l:1,q:"エルメスが創業した国は？",a:["フランス","イタリア","イギリス","スイス"],k:0,
 e:"エルメスは1837年、パリで創業したフランスのメゾン。もとは馬具工房として始まりました。"},
{c:"maison",l:1,q:"ルイ・ヴィトンが創業当初に手掛けていた主力製品は？",a:["トランク（旅行鞄）","婦人靴","香水","腕時計"],k:0,
 e:"ルイ・ヴィトンは旅行用トランクの工房として1854年に創業。平らな天面のトランクで名を上げました。"},
{c:"maison",l:1,q:"「マトラッセ（キルティング）」のバッグで知られるメゾンは？",a:["シャネル","グッチ","プラダ","フェンディ"],k:0,
 e:"シャネルのキルティング（マトラッセ）は乗馬服やステンドグラスから着想を得たとされる象徴的な意匠です。"},
{c:"maison",l:1,q:"グッチが創業した国は？",a:["イタリア","フランス","スペイン","アメリカ"],k:0,
 e:"グッチは1921年、イタリア・フィレンツェで創業。革製品と馬具由来のモチーフで知られます。"},
{c:"maison",l:1,q:"ティファニーが本拠を置く国は？",a:["アメリカ","フランス","イギリス","イタリア"],k:0,
 e:"ティファニーは1837年にニューヨークで創業したアメリカを代表するジュエラーです。"},
{c:"maison",l:1,q:"「LOVE」ブレスレットで知られるジュエリーメゾンは？",a:["カルティエ","ブルガリ","ショパール","ブシュロン"],k:0,
 e:"カルティエの「LOVE」は1969年にニューヨークで誕生。専用ドライバーで留めるネジ意匠が象徴です。"},
{c:"maison",l:1,q:"トレンチコートやチェック柄で有名な、英国発のメゾンは？",a:["バーバリー","エルメス","セリーヌ","ロエベ"],k:0,
 e:"バーバリーは1856年創業の英国ブランド。防水生地ギャバジンやトレンチコートで知られます。"},
{c:"maison",l:1,q:"「レディ ディオール」や「サドル」バッグで知られるメゾンは？",a:["ディオール","セリーヌ","ロエベ","バレンシアガ"],k:0,
 e:"ディオールは1946年にクリスチャン・ディオールが創業。翌年の「ニュールック」で一躍時代の寵児となりました。"},
{c:"maison",l:1,q:"プラダが高級バッグに用い、一世を風靡した意外な素材は？",a:["ナイロン","麻","デニム","コルク"],k:0,
 e:"プラダは軽く丈夫なナイロン（ポコノ）素材のバッグで新境地を開き、実用性と高級感を両立させました。"},
{c:"maison",l:1,q:"「アルハンブラ」の四つ葉モチーフで有名なメゾンは？",a:["ヴァン クリーフ＆アーペル","カルティエ","ティファニー","ハリー・ウィンストン"],k:0,
 e:"ヴァン クリーフ＆アーペルのアルハンブラは1968年に誕生。幸運を呼ぶ四つ葉のクローバーがモチーフです。"},
{c:"maison",l:1,q:"エルメスが創業当初に作っていた製品は？",a:["馬具","靴","帽子","時計"],k:0,
 e:"エルメスは高級馬具工房として出発。自動車の普及で馬車が減ると、鞄や革小物へと事業を広げました。"},
{c:"maison",l:1,q:"「バーキン」「ケリー」のバッグで知られるメゾンは？",a:["エルメス","シャネル","ディオール","グッチ"],k:0,
 e:"バーキンとケリーはいずれもエルメスの象徴的バッグで、入手困難な人気モデルとして知られます。"},
{c:"maison",l:1,q:"モノグラム・キャンバスで有名なメゾンは？",a:["ルイ・ヴィトン","グッチ","フェンディ","ゴヤール"],k:0,
 e:"ルイ・ヴィトンのモノグラム・キャンバスは1896年に登場。LVの組み合わせと花・星の図案が特徴です。"},
{c:"maison",l:1,q:"真珠の養殖に世界で初めて成功した日本のジュエラーは？",a:["ミキモト","タサキ","カシケイ","和光"],k:0,
 e:"御木本幸吉が創業したミキモトは、真珠養殖を事業化し「真珠王」と呼ばれました。"},
{c:"maison",l:1,q:"ヴァン クリーフ＆アーペルが本店を構えるパリの広場は？",a:["ヴァンドーム広場","コンコルド広場","バスティーユ広場","トロカデロ広場"],k:0,
 e:"ヴァンドーム広場はカルティエやブシュロンなど高級宝飾店が集まる、宝飾の聖地です。"},
{c:"maison",l:1,q:"フェンディが創業した国は？",a:["イタリア","フランス","スペイン","イギリス"],k:0,
 e:"フェンディは1925年にローマで創業。ダブルFのロゴやファー、バゲットバッグで知られます。"},
{c:"maison",l:1,q:"革の編み込み「イントレチャート」で有名なメゾンは？",a:["ボッテガ・ヴェネタ","ロエベ","セリーヌ","バレンシアガ"],k:0,
 e:"ボッテガ・ヴェネタはイタリア発。ロゴに頼らず、編み込みレザー「イントレチャート」で個性を打ち出しました。"},
{c:"maison",l:1,q:"「セルペンティ（蛇）」のシリーズで有名なメゾンは？",a:["ブルガリ","カルティエ","ショパール","ショーメ"],k:0,
 e:"ブルガリのセルペンティは、とぐろを巻く蛇をかたどった同メゾンを代表するシリーズです。"},
{c:"maison",l:1,q:"「ハッピーダイヤモンド」で知られるメゾンは？",a:["ショパール","ブシュロン","ピアジェ","ダミアーニ"],k:0,
 e:"ショパールのハッピーダイヤモンドは、地板とサファイアガラスの間でダイヤが自由に動く仕掛けが特徴です。"},
{c:"maison",l:1,q:"「Y字（シェブロン）」の柄で知られるフランスの老舗トランクメゾンは？",a:["ゴヤール","モワナ","グローブ・トロッター","リモワ"],k:0,
 e:"ゴヤールは1853年創業。手描きで仕上げるシェブロン柄「ゴヤーディーヌ」が象徴です。"},
/* --- 中級 --- */
{c:"maison",l:2,q:"エルメスを1837年に創業した人物は？",a:["ティエリー・エルメス","エミール・エルメス","ロベール・デュマ","ジャン＝ルイ・デュマ"],k:0,
 e:"創業者ティエリー・エルメスは馬具職人として出発。以後、代々の当主が事業を革製品へと広げました。"},
{c:"maison",l:2,q:"ルイ・ヴィトンが創業した年は？",a:["1854年","1837年","1888年","1910年"],k:0,
 e:"1854年、ルイ・ヴィトンはパリに旅行鞄の店を構えました。1888年にはダミエ柄が登場します。"},
{c:"maison",l:2,q:"グッチを創業した人物は？",a:["グッチオ・グッチ","マリオ・プラダ","サルヴァトーレ・フェラガモ","ミウッチャ・プラダ"],k:0,
 e:"グッチオ・グッチはロンドンの高級ホテルで働いた経験から上流階級の趣味を学び、フィレンツェで創業しました。"},
{c:"maison",l:2,q:"カルティエを1847年に創業した人物は？",a:["ルイ＝フランソワ・カルティエ","ルイ・カルティエ","フレデリック・ブシュロン","チャールズ・ティファニー"],k:0,
 e:"ルイ＝フランソワ・カルティエがパリで創業。その孫たちがパリ・ロンドン・ニューヨークへ事業を広げました。"},
{c:"maison",l:2,q:"ティファニーを1837年に創業した人物は？",a:["チャールズ・ルイス・ティファニー","ルイ・コンフォート・ティファニー","ハリー・ウィンストン","チャールズ・カルティエ"],k:0,
 e:"チャールズ・ルイス・ティファニーが文具・雑貨店として出発。後に世界的な宝飾店へと発展させました。"},
{c:"maison",l:2,q:"ブルガリが創業した都市は？",a:["ローマ","ミラノ","フィレンツェ","ヴェネツィア"],k:0,
 e:"ブルガリはローマで創業。古代ローマや古典建築に着想を得た大胆なデザインが特徴です。"},

 e:"南京錠は「カデナ」、その鍵を収める小さな革カバーが「クロシェット」。付属が揃うと査定に有利です。"},
{c:"appraisal",l:3,q:"ラボグロウン（合成）ダイヤが天然ダイヤと査定額で大きく異なる理由は？",a:["希少性がなく相場が大幅に下がる","硬度が全く違う","偽物だから","色が付かないから"],k:0,
 e:"合成ダイヤは物理的には本物のダイヤですが、天然の希少性がないため査定額は天然より大幅に下がります。"}

</script>
<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};

  var CATS=[
    {id:"maison",   name:"メゾンの基礎",       desc:"創業者・本拠地・グループの系譜"},
    {id:"icon",     name:"代表モデル・アイコン", desc:"バーキンからアルハンブラまで"},
    {id:"craft",    name:"素材と職人技",       desc:"レザー・貴金属・宝石・技法"},
    {id:"hist",     name:"歴史とトリビア",     desc:"メゾンにまつわる物語"},
    {id:"appraisal",name:"査定・買取の知識",   desc:"状態評価・付属品・相場"}
  ];
  var LEVELS=[
    {id:1,crown:"I",  name:"初級",desc:"まずはここから。定番の知識"},
    {id:2,crown:"II", name:"中級",desc:"一歩踏み込んだ愛好家の領域"},
    {id:3,crown:"III",name:"上級",desc:"通をうならせる深い知識"},
    {id:0,crown:"◆",  name:"おまかせ（全レベル）",desc:"初〜上級をまとめて出題"}
  ];

  var pool=[], idx=0, score=0, streak=0, best=0, lastCat="mix", lastLevel=1;

  function shuffle(a){
    a=a.slice();
    for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
    return a;
  }
  function show(id){
    var s=document.querySelectorAll(".screen");
    for(var i=0;i<s.length;i++)s[i].classList.remove("active");
    $(id).classList.add("active");
    window.scrollTo({top:0,behavior:"smooth"});
  }
  function countFor(catId,level){
    return QUESTIONS.filter(function(q){
      var okC=(catId==="mix")||q.c===catId;
      var okL=(level===0)||q.l===level;
      return okC&&okL;
    }).length;
  }

  /* ---- start ---- */
  function buildStart(){
    var g=$("catGrid"); g.innerHTML="";
    CATS.forEach(function(c){
      var b=document.createElement("button");
      b.className="cat";
      b.innerHTML='<div class="cat-name">'+c.name+'</div>'+
        '<div class="cat-desc">'+c.desc+'</div>'+
        '<div class="cat-count">全 '+countFor(c.id,0)+' 問</div>';
      b.onclick=function(){openDifficulty(c.id);};
      g.appendChild(b);
    });
    var mix=document.createElement("button");
    mix.className="cat mix";
    mix.innerHTML='<div class="cat-name">総合ミックス</div>'+
      '<div class="cat-desc">全カテゴリーからランダム出題（全 '+countFor("mix",0)+' 問）</div>';
    mix.onclick=function(){openDifficulty("mix");};
    g.appendChild(mix);
  }

  /* ---- difficulty ---- */
  function openDifficulty(catId){
    lastCat=catId;
    var label=(catId==="mix")?"総合ミックス":(CATS.filter(function(c){return c.id===catId;})[0].name);
    $("diffLead").textContent="「"+label+"」― 難易度を選んでください。";
    var g=$("diffGrid"); g.innerHTML="";
    LEVELS.forEach(function(lv){
      var n=countFor(catId,lv.id);
      var b=document.createElement("button");
      b.className="diff";
      b.innerHTML='<span class="crown">'+lv.crown+'</span>'+
        '<span><span class="d-name">'+lv.name+'</span><br><span class="d-desc">'+lv.desc+'</span></span>'+
        '<span class="d-count">'+n+' 問</span>';
      b.onclick=function(){start(catId,lv.id);};
      g.appendChild(b);
    });
    show("diffScreen");
  }

  /* ---- start quiz ---- */
  function start(catId,level){
    lastCat=catId; lastLevel=level;
    var qs=QUESTIONS.filter(function(q){
      var okC=(catId==="mix")||q.c===catId;
      var okL=(level===0)||q.l===level;
      return okC&&okL;
    });
    pool=shuffle(qs);
    idx=0; score=0; streak=0; best=0;
    show("quizScreen");
    render();
  }

  var catName={};
  CATS.forEach(function(c){catName[c.id]=c.name;});
  var levelName={1:"初級",2:"中級",3:"上級"};

  function render(){
    var q=pool[idx];
    $("qNum").textContent=(idx+1)+" / "+pool.length;
    $("reserveFill").style.width=(((idx)/pool.length)*100)+"%";
    $("streak").textContent="◆ "+streak;
    $("qCat").textContent=catName[q.c]+"　・　"+(levelName[q.l]||"");
    $("qText").textContent=q.q;
    $("explain").classList.remove("show");
    $("nextBtn").style.display="none";

    var opts=$("opts"); opts.innerHTML="";
    var order=shuffle([0,1,2,3]);
    var marks=["A","B","C","D"];
    order.forEach(function(optIndex,pos){
      var btn=document.createElement("button");
      btn.className="opt";
      btn.innerHTML='<span class="mark">'+marks[pos]+'</span><span>'+q.a[optIndex]+'</span>';
      btn.onclick=function(){choose(optIndex,btn);};
      opts.appendChild(btn);
    });
  }

  function choose(optIndex,btn){
    var q=pool[idx];
    var buttons=$("opts").querySelectorAll(".opt");
    for(var i=0;i<buttons.length;i++)buttons[i].disabled=true;

    var correct=(optIndex===q.k);
    if(correct){
      btn.classList.add("correct");
      score++; streak++; if(streak>best)best=streak;
    }else{
      btn.classList.add("wrong");
      streak=0;
      // highlight the correct one
      for(var j=0;j<buttons.length;j++){
        var span=buttons[j].querySelector("span:last-child");
        if(span&&span.textContent===q.a[q.k]){buttons[j].classList.add("correct");}
      }
    }
    $("streak").textContent="◆ "+streak;
    $("reserveFill").style.width=(((idx+1)/pool.length)*100)+"%";

    var v=$("verdict");
    v.textContent=correct?"正解":"惜しい！";
    v.className="verdict "+(correct?"ok":"ng");
    $("note").textContent=q.e;
    $("explain").classList.add("show");

    var nb=$("nextBtn");
    nb.textContent=(idx+1>=pool.length)?"結果を見る →":"次の問題 →";
    nb.style.display="block";
  }

  function nextQ(){
    idx++;
    if(idx>=pool.length){finish();}
    else{render();}
  }

  function finish(){
    var total=pool.length;
    var pct=total?Math.round((score/total)*100):0;
    show("resultScreen");
    $("pct").textContent=pct+"%";
    $("frac").textContent=score+" / "+total;
    setTimeout(function(){
      $("gaugeArc").setAttribute("stroke-dashoffset", String(553*(1-pct/100)));
    },80);

    var badge,sub;
    if(pct===100){badge="メゾン・マスター";sub="全問正解。あなたの審美眼は本物です。";}
    else if(pct>=80){badge="コレクター級";sub="卓越した知識。目利きの域に達しています。";}
    else if(pct>=60){badge="愛好家";sub="確かな知識をお持ちです。あと一歩で通の領域へ。";}
    else if(pct>=40){badge="見習い鑑定士";sub="基礎は上々。解説を読めばさらに伸びます。";}
    else{badge="入門者";sub="ここが出発点。豆知識を楽しみながら重ねましょう。";}
    $("titleBadge").textContent=badge;
    $("titleSub").textContent=sub+"（最大連続正解 "+best+"）";
  }

  /* ---- wiring ---- */
  $("nextBtn").onclick=nextQ;
  $("backToCat").onclick=function(){show("startScreen");};
  $("quitBtn").onclick=function(){show("startScreen");};
  $("retryBtn").onclick=function(){start(lastCat,lastLevel);};
  $("otherLevelBtn").onclick=function(){openDifficulty(lastCat);};
  $("homeBtn").onclick=function(){show("startScreen");};

  buildStart();
})();
</script>
